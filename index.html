  <body class="page-loading">
    <!--begin::Theme mode setup on page load-->
    <script>
      let themeMode = "system";

      if (localStorage.getItem("kt_theme_mode_value")) {
        themeMode = localStorage.getItem("kt_theme_mode_value");
      }

      if (themeMode === "system") {
        themeMode = window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      document.documentElement.setAttribute("data-bs-theme", themeMode);
      document.documentElement.classList.toggle("dark", themeMode === "dark");
    </script>
    <!--end::Theme mode setup on page load-->

    <div id="app"></div>

    <!--begin::Loading markup-->
    <div id="splash-screen" class="splash-screen">
      <img
        id="splash-logo-dark"
        src="/media/logos/salepro/logo-salepro.png"
        class="dark-logo"
        style="max-width: 300px"
        alt="Logo"
      />
      <img
        id="splash-logo-light"
        src="/media/logos/salepro/logo-salepro.png"
        class="light-logo"
        style="max-width: 300px"
        alt="Logo"
      />
      <div class="loader-wrapper">
        <span class="loader"></span>
        <span class="loading-text">Vui lòng chờ...</span>
      </div>
    </div>
    <!--end::Loading markup-->

    <!-- Load dynamic logo from localStorage if available -->
    <script>
      (function () {
        try {
          function detectDomainSlug() {
            const hostname = window.location.hostname;

            if (hostname === "localhost" || hostname === "127.0.0.1") {
              return "";
            }

            if (hostname.includes(".localhost")) {
              return hostname.split(".")[0];
            }

            const parts = hostname.split(".");
            if (parts.length >= 2) {
              const slug = parts[0];
              if (slug === "www" || slug === "localhost") {
                return "";
              }
              return slug;
            }

            return "";
          }

          const currentSlug = detectDomainSlug();

          if (currentSlug) {
            const domainConfigs = localStorage.getItem("domain_configs");
            if (domainConfigs) {
              const configs = JSON.parse(domainConfigs);
              const domainConfig = configs.find((c) => c.slug === currentSlug);
              if (domainConfig && domainConfig.logo_url) {
                const darkLogo = document.getElementById("splash-logo-dark");
                const lightLogo = document.getElementById("splash-logo-light");
                if (darkLogo) darkLogo.src = domainConfig.logo_url;
                if (lightLogo) lightLogo.src = domainConfig.logo_url;
              }
            }
          }
        } catch (e) {
          // Silent fail - use default logos
        }
      })();
    </script>
